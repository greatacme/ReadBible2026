<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 연세대학교회 성경통독</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-900 text-white py-6 text-center shadow-lg">
    <h1 class="text-2xl font-bold tracking-wide">2026년 연세대학교회 성경통독</h1>
    <p class="text-blue-300 text-sm mt-1">믿음으로 읽는 하나님의 말씀</p>
  </header>

  <main class="max-w-2xl mx-auto p-4 space-y-4">

    <!-- Top 10 Chart -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-4">🏆 완료율 TOP 10</h2>
      <div id="chartWrap">
        <canvas id="chart"></canvas>
      </div>
      <p id="chartEmpty" class="text-gray-400 text-sm text-center py-4 hidden">아직 참여자가 없습니다</p>
    </section>

    <!-- All Users -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📋 전체 참여 현황</h2>
      <div id="userList">
        <p class="text-gray-400 text-sm text-center py-4">불러오는 중...</p>
      </div>
    </section>

    <!-- Login -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📖 내 기록 보기</h2>
      <div class="flex gap-2">
        <input id="nicknameInput" type="text" placeholder="별명 입력"
          class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        <button onclick="goRecord()"
          class="bg-blue-800 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-blue-900 transition">
          기록
        </button>
      </div>
      <p id="errMsg" class="text-red-500 text-xs mt-2 hidden"></p>
    </section>

  </main>

  <script>
    let chartInstance = null;

    async function loadStats() {
      const [allRes, top10Res] = await Promise.all([
        fetch('/api/stats/all'),
        fetch('/api/stats/top10'),
      ]);
      const all   = await allRes.json();
      const top10 = await top10Res.json();
      renderChart(top10);
      renderUserList(all);
    }

    function renderChart(data) {
      if (data.length === 0) {
        document.getElementById('chartWrap').classList.add('hidden');
        document.getElementById('chartEmpty').classList.remove('hidden');
        return;
      }
      const maxVal = Math.max(100, ...data.map(d => d.rate));
      const ctx = document.getElementById('chart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.nickname),
          datasets: [{
            label: '완료율 (%)',
            data: data.map(d => d.rate),
            backgroundColor: data.map((_, i) =>
              i === 0 ? '#1e3a8a' : i === 1 ? '#1d4ed8' : i === 2 ? '#2563eb' : '#93c5fd'
            ),
            borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: {
              beginAtZero: true,
              max: maxVal,
              ticks: { callback: v => v + '%' }
            }
          }
        }
      });
    }

    function renderUserList(data) {
      const el = document.getElementById('userList');
      if (data.length === 0) {
        el.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">아직 참여자가 없습니다</p>';
        return;
      }
      el.innerHTML = data.map((u, i) => `
        <div class="flex items-center justify-between py-2 border-b last:border-0 cursor-pointer hover:bg-slate-50 px-1 rounded"
             onclick="location.href='/record?nickname=${encodeURIComponent(u.nickname)}'">
          <div class="flex items-center gap-3">
            <span class="text-gray-400 text-xs w-5 text-right">${i + 1}</span>
            <span class="text-sm font-medium text-gray-800">${u.nickname}</span>
          </div>
          <div class="text-right">
            <span class="text-sm font-bold ${u.rate >= 100 ? 'text-green-600' : 'text-blue-700'}">${u.rate}%</span>
            <span class="text-xs text-gray-400 ml-1">${u.completed}/${u.planned}장</span>
          </div>
        </div>
      `).join('');
    }

    async function goRecord() {
      const nickname = document.getElementById('nicknameInput').value.trim();
      const errEl = document.getElementById('errMsg');
      if (!nickname) {
        errEl.textContent = '별명을 입력하세요';
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');

      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname }),
      });
      if (res.ok) {
        location.href = `/record?nickname=${encodeURIComponent(nickname)}`;
      } else {
        errEl.textContent = '오류가 발생했습니다. 다시 시도하세요.';
        errEl.classList.remove('hidden');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nicknameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') goRecord();
      });
      loadStats();
    });
  </script>
</body>
</html>
