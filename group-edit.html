<!DOCTYPE html>
<html lang="ko" style="font-size: 120%">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>그룹 편집</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button id="backBtn" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <h1 class="text-base font-bold">그룹 편집</h1>
  </header>

  <main class="max-w-2xl mx-auto p-4">
    <div class="bg-white rounded-2xl shadow p-5 space-y-5">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">그룹 코드</label>
        <input id="inputGroup" type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <p id="errorMsg" class="text-red-500 text-xs hidden"></p>

      <button id="saveBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        저장
      </button>
    </div>
  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const params    = new URLSearchParams(location.search)
    const groupCode = params.get('group')
    if (!groupCode) location.href = 'home.html'

    document.getElementById('inputGroup').value = groupCode
    document.getElementById('backBtn').onclick = () =>
      location.href = `index.html?group=${encodeURIComponent(groupCode)}`

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.classList.remove('hidden')
    }

    document.getElementById('saveBtn').onclick = async () => {
      const newGroup = document.getElementById('inputGroup').value.trim()
      document.getElementById('errorMsg').classList.add('hidden')

      if (!newGroup) { showError('그룹 코드를 입력해주세요.'); return }
      if (newGroup === groupCode) {
        location.href = `index.html?group=${encodeURIComponent(groupCode)}`
        return
      }

      // 중복 확인
      const { data: dup } = await sb.from('groups').select('group_code')
        .eq('group_code', newGroup).maybeSingle()
      if (dup) { showError('이미 존재하는 그룹 코드입니다.'); return }

      // 기존 그룹 plan_set_id 조회
      const { data: oldGrp } = await sb.from('groups').select('plan_set_id')
        .eq('group_code', groupCode).maybeSingle()
      const planSetId = oldGrp?.plan_set_id ?? 1

      // 새 그룹 insert → users group_code 일괄 변경 → 기존 그룹 delete
      const { error: insertErr } = await sb.from('groups')
        .insert({ group_code: newGroup, plan_set_id: planSetId })
      if (insertErr) { showError('저장 중 오류가 발생했습니다.'); return }

      await sb.from('users').update({ group_code: newGroup }).eq('group_code', groupCode)
      await sb.from('groups').delete().eq('group_code', groupCode)

      location.href = `index.html?group=${encodeURIComponent(newGroup)}`
    }

    document.getElementById('inputGroup').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('saveBtn').click()
    })
  </script>
</body>
</html>
