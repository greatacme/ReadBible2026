<!DOCTYPE html>
<html lang="ko" style="font-size: 120%">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>그룹 편집</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button id="backBtn" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <h1 class="text-base font-bold">그룹 편집</h1>
  </header>

  <main class="max-w-2xl mx-auto p-4">
    <form accept-charset="UTF-8" onsubmit="return false;">
      <div class="bg-white rounded-2xl shadow p-5 space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">그룹명</label>
          <input id="inputGroup" type="text"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <p id="errorMsg" class="text-red-500 text-xs hidden"></p>

        <button id="saveBtn" type="button"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
          저장
        </button>

        <hr class="border-gray-200"/>

        <button id="deleteBtn" type="button"
          class="w-full bg-white hover:bg-red-50 text-red-500 border border-red-300 font-semibold py-2.5 rounded-lg text-sm transition">
          그룹 삭제
        </button>
      </div>
    </form>
  </main>

  <!-- 복사 완료 팝업 -->
  <div id="copyModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full space-y-4 text-center">
      <p class="text-gray-800 font-semibold">그룹 링크가 복사되었습니다.</p>
      <p class="text-gray-500 text-sm">필요한 곳에 공유하세요.</p>
      <button id="copyModalOkBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        확인
      </button>
    </div>
  </div>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const params       = new URLSearchParams(location.search)
    const groupCode    = params.get('group')
    const ministryCode = params.get('ministry') || '0'
    if (!groupCode) location.href = `home.html?ministry=${encodeURIComponent(ministryCode)}`

    // 그룹명 조회해서 초기화
    async function loadGroupName() {
      const { data: grp } = await sb.from('groups').select('group_nm')
        .eq('group_code', groupCode).eq('ministry_cd', ministryCode).maybeSingle()
      if (grp?.group_nm) {
        document.getElementById('inputGroup').value = grp.group_nm
      }
    }
    loadGroupName()

    document.getElementById('backBtn').onclick = () =>
      location.href = `index.html?group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}`

    function isValidGroupCode(text) {
      if (!text || text.length === 0) return false
      // 한글, 영문, 숫자, 공백, 하이픈, 언더스코어, 마침표, 괄호만 허용
      return /^[\p{L}\p{N}\p{M}\s\-_.()]+$/u.test(text)
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.classList.remove('hidden')
    }

    document.getElementById('saveBtn').onclick = async () => {
      const newGroupName = document.getElementById('inputGroup').value.trim()
      document.getElementById('errorMsg').classList.add('hidden')

      if (!newGroupName) { showError('그룹명을 입력해주세요.'); return }
      if (!isValidGroupCode(newGroupName)) { showError('한글, 영문, 숫자, 공백, 기호(-_.())만 사용 가능합니다'); return }

      // 그룹명 변경 (group_code는 불변)
      const { error } = await sb.from('groups')
        .update({ group_nm: newGroupName })
        .eq('group_code', groupCode).eq('ministry_cd', ministryCode)
      if (error) { showError('저장 중 오류가 발생했습니다.'); return }

      const url = `${location.origin}${location.pathname.replace('group-edit.html', 'index.html')}?group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}`
      await navigator.clipboard.writeText(url)

      document.getElementById('copyModal').classList.remove('hidden')
      document.getElementById('copyModalOkBtn').onclick = () => { location.href = url }
    }

    document.getElementById('inputGroup').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('saveBtn').click()
    })

    // ── 그룹 삭제 ─────────────────────────────────────────────────────────
    document.getElementById('deleteBtn').onclick = async () => {
      document.getElementById('errorMsg').classList.add('hidden')

      // 소속 사용자 수 확인
      const { data: users } = await sb.from('users').select('id').eq('group_code', groupCode).eq('ministry_cd', ministryCode)
      if (users && users.length > 0) {
        showError(`이 그룹에 ${users.length}명의 사용자가 있습니다. 모든 사용자를 다른 그룹으로 이동한 후 삭제해주세요.`)
        return
      }

      if (!confirm(`'${groupCode}' 그룹을 삭제하시겠습니까?`)) return

      await sb.from('groups').delete().eq('group_code', groupCode).eq('ministry_cd', ministryCode)
      location.href = `home.html?ministry=${encodeURIComponent(ministryCode)}`
    }
  </script>
</body>
</html>
