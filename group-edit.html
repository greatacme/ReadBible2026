<!DOCTYPE html>
<html lang="ko" style="font-size: 120%">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>그룹 편집</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button id="backBtn" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <h1 class="text-base font-bold">그룹 편집</h1>
  </header>

  <main class="max-w-2xl mx-auto p-4">
    <div class="bg-white rounded-2xl shadow p-5 space-y-5">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">그룹 코드</label>
        <input id="inputGroup" type="text"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">성경 버전</label>
        <select id="inputVersion"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="KRV">개역한글</option>
          <option value="KLB">현대인의 성경</option>
        </select>
      </div>

      <p id="errorMsg" class="text-red-500 text-xs hidden"></p>

      <button id="saveBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        저장
      </button>

      <hr class="border-gray-200"/>

      <button id="deleteBtn"
        class="w-full bg-white hover:bg-red-50 text-red-500 border border-red-300 font-semibold py-2.5 rounded-lg text-sm transition">
        그룹 삭제
      </button>
    </div>
  </main>

  <!-- 복사 완료 팝업 -->
  <div id="copyModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full space-y-4 text-center">
      <p class="text-gray-800 font-semibold">그룹 링크가 복사되었습니다.</p>
      <p class="text-gray-500 text-sm">필요한 곳에 공유하세요.</p>
      <button id="copyModalOkBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        확인
      </button>
    </div>
  </div>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const params    = new URLSearchParams(location.search)
    const groupCode = params.get('group')
    if (!groupCode) location.href = 'home.html'

    let currentVersionId = 'KRV'

    // 그룹 정보 로드
    async function loadGroupInfo() {
      const { data: group } = await sb.from('groups').select('version_id')
        .eq('group_code', groupCode).maybeSingle()
      if (group) {
        currentVersionId = group.version_id || 'KRV'
        document.getElementById('inputVersion').value = currentVersionId
      }
    }

    document.getElementById('inputGroup').value = groupCode
    document.getElementById('backBtn').onclick = () =>
      location.href = `index.html?group=${encodeURIComponent(groupCode)}`

    loadGroupInfo()

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.classList.remove('hidden')
    }

    document.getElementById('saveBtn').onclick = async () => {
      const newGroup = document.getElementById('inputGroup').value.trim()
      const newVersion = document.getElementById('inputVersion').value
      document.getElementById('errorMsg').classList.add('hidden')

      if (!newGroup) { showError('그룹 코드를 입력해주세요.'); return }

      // 그룹명과 버전 모두 변경 없는 경우
      if (newGroup === groupCode && newVersion === currentVersionId) {
        location.href = `index.html?group=${encodeURIComponent(groupCode)}`
        return
      }

      // 그룹명이 변경된 경우 중복 확인
      if (newGroup !== groupCode) {
        const { data: dup } = await sb.from('groups').select('group_code')
          .eq('group_code', newGroup).maybeSingle()
        if (dup) { showError('이미 존재하는 그룹 코드입니다.'); return }
      }

      // 그룹명 변경 없이 버전만 변경하는 경우
      if (newGroup === groupCode) {
        const { error: updateErr } = await sb.from('groups')
          .update({ version_id: newVersion }).eq('group_code', groupCode)
        if (updateErr) { showError('저장 중 오류가 발생했습니다.'); return }
        location.href = `index.html?group=${encodeURIComponent(groupCode)}`
        return
      }

      // 그룹명 변경하는 경우
      const { data: oldGrp } = await sb.from('groups').select('plan_set_id')
        .eq('group_code', groupCode).maybeSingle()
      const planSetId = oldGrp?.plan_set_id ?? 1

      const { error: insertErr } = await sb.from('groups')
        .insert({ group_code: newGroup, plan_set_id: planSetId, version_id: newVersion })
      if (insertErr) { showError('저장 중 오류가 발생했습니다.'); return }

      await sb.from('users').update({ group_code: newGroup }).eq('group_code', groupCode)
      await sb.from('groups').delete().eq('group_code', groupCode)

      const url = `${location.origin}${location.pathname.replace('group-edit.html', 'index.html')}?group=${encodeURIComponent(newGroup)}`
      await navigator.clipboard.writeText(url)

      document.getElementById('copyModal').classList.remove('hidden')
      document.getElementById('copyModalOkBtn').onclick = () => { location.href = url }
    }

    document.getElementById('inputGroup').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('saveBtn').click()
    })

    // ── 그룹 삭제 ─────────────────────────────────────────────────────────
    document.getElementById('deleteBtn').onclick = async () => {
      document.getElementById('errorMsg').classList.add('hidden')

      // 소속 사용자 수 확인
      const { data: users } = await sb.from('users').select('id').eq('group_code', groupCode)
      if (users && users.length > 0) {
        showError(`이 그룹에 ${users.length}명의 사용자가 있습니다. 모든 사용자를 다른 그룹으로 이동한 후 삭제해주세요.`)
        return
      }

      if (!confirm(`'${groupCode}' 그룹을 삭제하시겠습니까?`)) return

      await sb.from('groups').delete().eq('group_code', groupCode)
      location.href = 'home.html'
    }
  </script>
</body>
</html>
