<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 연세대학교회 성경통독</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white py-6 text-center shadow-lg">
    <h1 id="siteTitle" class="text-2xl font-bold tracking-wide">✝ 2026년 연세대학교회 성경통독</h1>
    <p id="siteSubtitle" class="text-blue-300 text-sm mt-1">믿음으로 읽는 하나님의 말씀</p>
  </header>

  <main class="max-w-2xl mx-auto p-4 space-y-4">

    <!-- 로그인 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📖 나의 성경 읽기</h2>
      <div class="flex gap-2">
        <input id="nicknameInput" type="text" placeholder="별명 입력"
          class="flex-1 min-w-0 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        <button onclick="goRecord()"
          class="flex-shrink-0 w-16 bg-blue-800 text-white py-2 rounded-lg text-sm font-semibold hover:bg-blue-900 transition">
          기록
        </button>
      </div>
      <p id="errMsg" class="text-red-500 text-xs mt-2 hidden"></p>
    </section>

    <!-- TOP 10 차트 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-4">🏆 완독률 TOP</h2>
      <canvas id="chart" class="hidden"></canvas>
      <p id="chartEmpty" class="text-gray-400 text-sm text-center py-4 hidden">아직 참여자가 없습니다</p>
      <p id="chartLoading" class="text-gray-400 text-sm text-center py-4">불러오는 중...</p>
    </section>

    <!-- 전체 참여 현황 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📋 전체 참여 현황</h2>
      <div id="userList">
        <p class="text-gray-400 text-sm text-center py-4">불러오는 중...</p>
      </div>
    </section>

  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const groupCode  = new URLSearchParams(location.search).get('group')
    const planSetId  = parseInt(new URLSearchParams(location.search).get('plan')) || 1
    const groupParam = groupCode ? `&group=${encodeURIComponent(groupCode)}` : ''

    document.addEventListener('DOMContentLoaded', () => {
      if (!groupCode) {
        document.getElementById('nicknameInput').disabled = true
        document.querySelector('button[onclick="goRecord()"]').disabled = true
        const errEl = document.getElementById('errMsg')
        errEl.textContent = '그룹 코드가 필요합니다. URL에 ?group=그룹명 을 추가해주세요.'
        errEl.classList.remove('hidden')
      } else {
        document.getElementById('siteSubtitle').textContent = `그룹: ${groupCode} · 플랜: ${planSetId}`
      }
    })

    let chartInstance = null

    async function loadStats() {
      if (!groupCode) return

      // groups 조회 + get_stats 병렬 실행
      const [{ data: grp }, { data, error }] = await Promise.all([
        sb.from('groups').select('plan_set_id').eq('group_code', groupCode).maybeSingle(),
        sb.rpc('get_stats', { p_group_code: groupCode })
      ])
      if (grp) {
        document.getElementById('siteSubtitle').textContent = `그룹: ${groupCode} · 플랜: ${grp.plan_set_id}`
      }
      document.getElementById('chartLoading').classList.add('hidden')

      if (error || !data || data.length === 0) {
        document.getElementById('chartEmpty').classList.remove('hidden')
        document.getElementById('userList').innerHTML =
          '<p class="text-gray-400 text-sm text-center py-4">아직 참여자가 없습니다</p>'
        return
      }

      renderChart(data.slice(0, 10))
      renderUserList(data)
    }

    function renderChart(data) {
      const canvas = document.getElementById('chart')
      canvas.classList.remove('hidden')
      const maxVal = Math.max(100, ...data.map(d => Number(d.rate)))
      if (chartInstance) chartInstance.destroy()
      chartInstance = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
          labels: data.map(d => d.nickname),
          datasets: [{
            label: '완독률 (%)',
            data: data.map(d => Number(d.rate)),
            backgroundColor: data.map((_, i) =>
              i === 0 ? '#1e3a8a' : i === 1 ? '#1d4ed8' : i === 2 ? '#2563eb' : '#93c5fd'
            ),
            borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true, max: maxVal, ticks: { callback: v => v + '%' } },
            y: { ticks: { autoSkip: false, font: { size: 10 } } }
          }
        }
      })
    }

    function renderUserList(data) {
      document.getElementById('userList').innerHTML = data.map((u, i) => `
        <div class="flex items-center justify-between py-2 border-b last:border-0 cursor-pointer
                    hover:bg-slate-50 px-1 rounded"
             onclick="location.href='record.html?nickname=${encodeURIComponent(u.nickname)}${groupParam}'">
          <div class="flex items-center gap-3">
            <span class="text-gray-400 text-xs w-5 text-right">${i + 1}</span>
            <span class="text-sm font-medium text-gray-800">${u.nickname}</span>
          </div>
          <div class="text-right">
            <span class="text-sm font-bold ${Number(u.rate) >= 100 ? 'text-green-600' : 'text-blue-700'}">
              ${u.rate}%
            </span>
            <span class="text-xs text-gray-400 ml-1">${u.completed}/${u.planned}장</span>
          </div>
        </div>
      `).join('')
    }

    async function goRecord() {
      const nickname = document.getElementById('nicknameInput').value.trim()
      const errEl = document.getElementById('errMsg')
      if (!nickname) {
        errEl.textContent = '별명을 입력하세요'
        errEl.classList.remove('hidden')
        return
      }
      errEl.classList.add('hidden')

      // 그룹 등록 (최초 1회만 plan_set_id 저장, 이미 있으면 유지)
      await sb.from('groups').upsert(
        { group_code: groupCode, plan_set_id: planSetId },
        { onConflict: 'group_code', ignoreDuplicates: true }
      )

      // 기존 사용자 조회 또는 신규 등록
      let { data: user } = await sb.from('users').select('id').eq('nickname', nickname).eq('group_code', groupCode).maybeSingle()
      if (!user) {
        const { data: newUser, error } = await sb.from('users').insert({ nickname, group_code: groupCode }).select('id').single()
        if (error) {
          errEl.textContent = '등록 중 오류가 발생했습니다'
          errEl.classList.remove('hidden')
          return
        }
        user = newUser
      }
      location.href = `record.html?nickname=${encodeURIComponent(nickname)}${groupParam}`
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nicknameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') goRecord()
      })
      loadStats()
    })
  </script>
</body>
</html>
