<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 연세대학교회 성경통독</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white py-6 shadow-lg">
    <h1 id="siteTitle" class="text-2xl font-bold tracking-wide text-center">✝ 2026년 연세대학교회 성경통독</h1>
    <div class="flex items-center mt-1 px-4">
      <div class="flex-1 flex items-center">
        <a id="homeBtn" class="text-blue-400 hover:text-white text-sm whitespace-nowrap cursor-pointer">🏠 홈</a>
      </div>
      <p id="siteSubtitle" class="text-blue-300 text-base">믿음으로 읽는 하나님의 말씀</p>
      <div class="flex-1 flex items-center justify-end gap-3">
        <a id="groupEditBtn" href="#" class="hidden text-blue-400 hover:text-white text-xs whitespace-nowrap">그룹편집</a>
        <button id="shareBtn" onclick="shareGroup()" class="hidden text-blue-400 hover:text-white text-xs whitespace-nowrap">공유</button>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-4 space-y-4">

    <!-- 로그인 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📖 나의 성경 읽기</h2>
      <form accept-charset="UTF-8" onsubmit="goRecord(); return false;">
        <div class="flex gap-2">
          <input id="nicknameInput" type="text" placeholder="이름 또는 별명 입력"
            class="flex-1 min-w-0 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          <button type="button" onclick="goRecord()"
            class="flex-shrink-0 w-16 bg-blue-800 text-white py-2 rounded-lg text-sm font-semibold hover:bg-blue-900 transition">
            기록
          </button>
        </div>
      </form>
      <p id="errMsg" class="text-red-500 text-xs mt-2 hidden"></p>
    </section>

    <!-- TOP 차트 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <div class="flex items-center gap-2 mb-4">
        <h2 class="text-base font-semibold text-gray-700">🏆 완독률 TOP</h2>
        <select id="topCount" onchange="onTopCountChange()"
          class="border border-gray-300 rounded-lg px-2 py-1 text-base font-semibold text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
        </select>
      </div>
      <canvas id="chart" class="hidden"></canvas>
      <p id="chartEmpty" class="text-gray-400 text-sm text-center py-4 hidden">아직 참여자가 없습니다</p>
      <p id="chartLoading" class="text-gray-400 text-sm text-center py-4">불러오는 중...</p>
    </section>

    <!-- 전체 참여 현황 -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-semibold text-gray-700 mb-3">📋 전체 참여 현황</h2>
      <div id="userList">
        <p class="text-gray-400 text-sm text-center py-4">불러오는 중...</p>
      </div>
    </section>

  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const groupCode  = new URLSearchParams(location.search).get('group')
    const ministryCode = new URLSearchParams(location.search).get('ministry') || '0'
    const planSetId  = parseInt(new URLSearchParams(location.search).get('plan')) || 1
    const groupParam = groupCode ? `&group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}` : ''

    async function loadTitle() {
      const { data: ministry } = await sb.from('COMM_CODE').select('code_nm')
        .eq('code_group', 'ministry').eq('code_cd', ministryCode).maybeSingle()
      if (ministry?.code_nm) {
        document.getElementById('siteTitle').textContent = `✝ 2026년 ${ministry.code_nm} 성경통독`
      }
    }

    async function loadGroupInfo() {
      const { data: grp } = await sb.from('groups').select('group_nm')
        .eq('group_code', groupCode).eq('ministry_cd', ministryCode).maybeSingle()
      if (grp?.group_nm) {
        document.getElementById('siteSubtitle').textContent = `${grp.group_nm} group`
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      loadTitle()
      if (!groupCode) {
        location.replace(`home.html?ministry=${encodeURIComponent(ministryCode)}`)
        return
      } else {
        await loadGroupInfo()
        const editBtn = document.getElementById('groupEditBtn')
        editBtn.href = `group-edit.html?group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}`
        editBtn.classList.remove('hidden')
        document.getElementById('shareBtn').classList.remove('hidden')
      }
    })

    let chartInstance = null
    let allStats = []

    async function loadStats() {
      if (!groupCode) return

      const [{ data: grp }, { data, error }] = await Promise.all([
        sb.from('groups').select('plan_set_cd').eq('group_code', groupCode).eq('ministry_cd', ministryCode).maybeSingle(),
        sb.rpc('get_stats', { p_group_code: groupCode, p_ministry_cd: ministryCode })
      ])
      if (!grp) { location.replace(`home.html?ministry=${encodeURIComponent(ministryCode)}`); return }
      document.getElementById('siteSubtitle').textContent = `${groupCode} group`
      document.getElementById('chartLoading').classList.add('hidden')

      if (error || !data || data.length === 0) {
        document.getElementById('chartEmpty').classList.remove('hidden')
        document.getElementById('userList').innerHTML =
          '<p class="text-gray-400 text-sm text-center py-4">아직 참여자가 없습니다</p>'
        return
      }

      allStats = data
      const topN = parseInt(document.getElementById('topCount').value)
      renderChart(allStats.slice(0, topN))
      renderUserList(allStats)
    }

    function onTopCountChange() {
      if (!allStats.length) return
      const topN = parseInt(document.getElementById('topCount').value)
      renderChart(allStats.slice(0, topN))
    }

    function renderChart(data) {
      const canvas = document.getElementById('chart')
      canvas.classList.remove('hidden')
      const maxVal = Math.max(100, ...data.map(d => Number(d.rate)))
      const fontSize = data.length <= 3 ? 14 : data.length <= 5 ? 11 : 9
      if (chartInstance) chartInstance.destroy()
      chartInstance = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
          labels: data.map(d => d.nickname),
          datasets: [{
            label: '완독률 (%)',
            data: data.map(d => Number(d.rate)),
            backgroundColor: data.map((_, i) =>
              i === 0 ? '#1e3a8a' : i === 1 ? '#1d4ed8' : i === 2 ? '#2563eb' : '#93c5fd'
            ),
            borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true, max: maxVal, ticks: { callback: v => v + '%' } },
            y: { ticks: { autoSkip: false, font: { size: fontSize } } }
          }
        }
      })
    }

    function renderUserList(data) {
      document.getElementById('userList').innerHTML = data.map((u, i) => `
        <div class="flex items-center justify-between py-2 border-b last:border-0 cursor-pointer
                    hover:bg-slate-50 px-1 rounded"
             onclick="location.href='record.html?nickname=${encodeURIComponent(u.nickname)}${groupParam}'">
          <div class="flex items-center gap-3">
            <span class="text-gray-400 text-xs w-5 text-right">${i + 1}</span>
            <span class="text-sm font-medium text-gray-800">${u.nickname}</span>
          </div>
          <div class="text-right">
            <span class="text-sm font-bold ${Number(u.rate) >= 100 ? 'text-green-600' : 'text-blue-700'}">
              ${u.rate}%
            </span>
            <span class="text-xs text-gray-400 ml-1">${u.completed}/${u.planned}장</span>
          </div>
        </div>
      `).join('')
    }

    function isValidNickname(text) {
      if (!text || text.length === 0) return false
      // 한글, 영문, 숫자, 공백, 하이픈, 언더스코어, 마침표, 괄호만 허용
      return /^[\p{L}\p{N}\p{M}\s\-_.()]+$/u.test(text)
    }

    async function goRecord() {
      const nickname = document.getElementById('nicknameInput').value.trim()
      const errEl = document.getElementById('errMsg')
      if (!nickname) {
        errEl.textContent = '별명을 입력하세요'
        errEl.classList.remove('hidden')
        return
      }
      if (!isValidNickname(nickname)) {
        errEl.textContent = '한글, 영문, 숫자, 공백, 기호(-_.())만 사용 가능합니다'
        errEl.classList.remove('hidden')
        return
      }
      errEl.classList.add('hidden')

      // 기존 사용자 조회 또는 신규 등록
      let { data: user } = await sb.from('users').select('id').eq('nickname', nickname).eq('group_code', groupCode).eq('ministry_cd', ministryCode).maybeSingle()
      if (!user) {
        if (!confirm(`'${nickname}'(으)로 신규 등록하시겠습니까?`)) return
        const { data: newUser, error } = await sb.from('users').insert({ nickname, group_code: groupCode, ministry_cd: ministryCode }).select('id').single()
        if (error) {
          errEl.textContent = '등록 중 오류가 발생했습니다'
          errEl.classList.remove('hidden')
          return
        }
        user = newUser
      }
      location.href = `record.html?nickname=${encodeURIComponent(nickname)}${groupParam}`
    }

    async function shareGroup() {
      const url = `${location.origin}${location.pathname}?group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}`
      await navigator.clipboard.writeText(url)
      const btn = document.getElementById('shareBtn')
      btn.textContent = '복사됨!'
      setTimeout(() => { btn.textContent = '공유' }, 2000)
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('homeBtn').onclick = () =>
        location.href = `home.html?ministry=${encodeURIComponent(ministryCode)}`
      document.getElementById('nicknameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') goRecord()
      })
      loadStats()
    })
  </script>
</body>
</html>
