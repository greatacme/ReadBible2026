<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>성경통독 기록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .focus-row {
      animation: highlight 2s ease-out forwards;
    }
    @keyframes highlight {
      0%   { background-color: #fef9c3; }
      100% { background-color: transparent; }
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button onclick="location.href='index.html'" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <div class="flex-1 min-w-0">
      <h1 id="userName" class="text-base font-bold truncate">성경통독 기록</h1>
      <p id="userRate" class="text-blue-300 text-xs"></p>
    </div>
    <div id="saveIndicator" class="text-xs text-green-300 opacity-0 transition-opacity duration-500 whitespace-nowrap">
      저장됨 ✓
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-4">
    <div id="content">
      <p class="text-gray-400 text-center py-10">불러오는 중...</p>
    </div>
  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const params   = new URLSearchParams(location.search)
    const nickname = params.get('nickname')
    if (!nickname) location.href = 'index.html'

    const DAYS = ['일', '월', '화', '수', '목', '금', '토']
    const today = new Date().toISOString().split('T')[0]

    let userId     = null
    let allRecords = []   // { plan_id, date, book, chapter_no, completed }
    let saveTimer  = null

    // ── 통계 표시 ──────────────────────────────────────────────────────
    function updateRateDisplay() {
      const planned   = allRecords.filter(r => r.date <= today).length
      const completed = allRecords.filter(r => r.completed).length
      const rate = planned > 0 ? (completed / planned * 100).toFixed(1) : '0.0'
      document.getElementById('userRate').textContent =
        `완료율 ${rate}% · ${completed}/${planned}장`
    }

    // ── 날짜 포맷 ─────────────────────────────────────────────────────
    function fmtDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00')
      return `${d.getMonth() + 1}/${d.getDate()}(${DAYS[d.getDay()]})`
    }

    // ── 렌더링 ────────────────────────────────────────────────────────
    function render() {
      const months = {}
      for (const r of allRecords) {
        const ym = r.date.slice(0, 7)
        ;(months[ym] = months[ym] || []).push(r)
      }

      document.getElementById('content').innerHTML =
        Object.entries(months).map(([ym, items]) => {
          const [y, m]    = ym.split('-')
          const monthDone = items.filter(i => i.completed).length
          const allDone   = monthDone === items.length

          const byDate = {}
          for (const r of items) (byDate[r.date] = byDate[r.date] || []).push(r)

          const datesHtml = Object.entries(byDate).map(([dt, chapters]) => {
            const dateDone   = chapters.filter(c => c.completed).length
            const dayAllDone = dateDone === chapters.length
            return `
            <div class="border-b last:border-0">
              <div class="flex items-center gap-2 px-4 py-1.5 bg-slate-50">
                <span class="text-xs font-semibold w-24 flex-shrink-0
                             ${dayAllDone ? 'text-green-600' : 'text-gray-500'}">
                  ${fmtDate(dt)}
                </span>
                <span class="text-xs text-gray-400">${dateDone}/${chapters.length}장</span>
                ${dayAllDone ? '<span class="text-green-500 text-xs ml-1">✓</span>' : ''}
              </div>
              ${chapters.map(ch => `
              <div class="flex items-center gap-3 px-4 py-2 hover:bg-slate-50 transition"
                   id="row-${ch.plan_id}">
                <input type="checkbox" id="chk-${ch.plan_id}"
                  ${ch.completed ? 'checked' : ''}
                  onchange="save(${ch.plan_id}, this.checked)"
                  class="w-4 h-4 accent-blue-700 cursor-pointer flex-shrink-0"/>
                <label for="chk-${ch.plan_id}"
                  class="text-sm cursor-pointer select-none
                         ${ch.completed ? 'text-gray-400 line-through' : 'text-gray-800'}">
                  ${ch.book} ${ch.chapter_no}장
                </label>
              </div>`).join('')}
            </div>`
          }).join('')

          return `
          <div class="bg-white rounded-2xl shadow mb-4 overflow-hidden">
            <button onclick="toggleMonth('${ym}')"
              class="w-full flex items-center justify-between px-4 py-3 bg-gray-50 hover:brightness-95 transition">
              <span class="font-semibold text-gray-700">${y}년 ${parseInt(m)}월</span>
              <span class="text-xs font-semibold ${allDone ? 'text-green-600' : 'text-gray-400'}">
                ${monthDone}/${items.length}장 완료
              </span>
            </button>
            <div id="month-${ym}" class="hidden">${datesHtml}</div>
          </div>`
        }).join('')
    }

    // ── 월 토글 ───────────────────────────────────────────────────────
    function toggleMonth(ym) {
      document.getElementById(`month-${ym}`).classList.toggle('hidden')
    }

    // ── 포커스: 첫 미완료 장의 월 펼치고 스크롤 ──────────────────────
    function focusFirstUnchecked() {
      const target = allRecords.find(r => !r.completed)
      const ym     = target ? target.date.slice(0, 7) : today.slice(0, 7)

      const monthDiv = document.getElementById(`month-${ym}`)
      if (monthDiv) monthDiv.classList.remove('hidden')

      if (!target) return

      setTimeout(() => {
        const row = document.getElementById(`row-${target.plan_id}`)
        if (!row) return
        const headerH = document.querySelector('header').offsetHeight
        const absTop  = row.getBoundingClientRect().top + window.scrollY
        window.scrollTo({ top: absTop - headerH - 12, behavior: 'smooth' })
        row.classList.add('focus-row')
      }, 50)
    }

    // ── 저장 ──────────────────────────────────────────────────────────
    async function save(planId, completed) {
      const rec = allRecords.find(r => r.plan_id === planId)
      if (rec) rec.completed = completed
      updateRateDisplay()

      const label = document.querySelector(`label[for="chk-${planId}"]`)
      if (label) {
        label.classList.toggle('text-gray-400', completed)
        label.classList.toggle('line-through',  completed)
        label.classList.toggle('text-gray-800', !completed)
      }

      await sb.from('records').upsert(
        { user_id: userId, plan_id: planId, completed, updated_at: new Date().toISOString() },
        { onConflict: 'user_id,plan_id' }
      )

      const ind = document.getElementById('saveIndicator')
      ind.style.opacity = '1'
      clearTimeout(saveTimer)
      saveTimer = setTimeout(() => { ind.style.opacity = '0' }, 2000)
    }

    // ── 데이터 로드 ───────────────────────────────────────────────────
    async function loadRecords() {
      // 1. 사용자 조회 또는 생성
      let { data: user } = await sb.from('users').select('id').eq('nickname', nickname).maybeSingle()
      if (!user) {
        const { data: newUser, error } = await sb.from('users').insert({ nickname }).select('id').single()
        if (error) { location.href = 'index.html'; return }
        user = newUser
      }
      userId = user.id

      // 2. 전체 계획 조회 (최대 1500행)
      const { data: plans } = await sb.from('plans').select('id, date, book, chapter_no').order('sort_order').limit(1500)

      // 3. 이 사용자의 완료 기록 조회
      const { data: records } = await sb.from('records').select('plan_id, completed').eq('user_id', userId)
      const recMap = Object.fromEntries((records || []).map(r => [r.plan_id, r.completed]))

      // 4. 병합
      allRecords = (plans || []).map(p => ({
        plan_id:    p.id,
        date:       p.date,
        book:       p.book,
        chapter_no: p.chapter_no,
        completed:  recMap[p.id] ?? false,
      }))

      document.getElementById('userName').textContent = `${nickname}님의 성경통독`
      updateRateDisplay()
      render()
      focusFirstUnchecked()
    }

    loadRecords()
  </script>
</body>
</html>
