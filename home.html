<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 성경통독 — 그룹 선택</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white py-6 shadow-lg">
    <h1 id="siteTitle" class="text-2xl font-bold tracking-wide text-center">✝ 2026년 연세대학교회 성경통독</h1>
    <div class="flex items-center mt-1 px-4">
      <div class="flex-1"></div>
      <p class="text-blue-300 text-base">그룹을 선택하세요</p>
      <div class="flex-1 flex justify-end">
        <button onclick="openCreateModal()" class="text-blue-400 hover:text-white text-xs whitespace-nowrap">+ 신규 그룹</button>
      </div>
    </div>
  </header>

  <!-- 신규 그룹 생성 모달 -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <form accept-charset="UTF-8" onsubmit="return false;" class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full space-y-4">
      <p class="font-semibold text-gray-800">신규 그룹 생성</p>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">그룹명</label>
        <input id="newGroupName" type="text" placeholder="예) 제2청장년"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">플랜</label>
        <select id="newPlanSetCd"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">불러오는 중...</option>
        </select>
      </div>
      <p id="createError" class="text-red-500 text-xs hidden"></p>
      <div class="flex gap-2">
        <button id="createCancelBtn" type="button"
          class="flex-1 border border-gray-300 text-gray-600 font-semibold py-2 rounded-lg text-sm hover:bg-gray-50 transition">
          취소
        </button>
        <button id="createConfirmBtn" type="button"
          class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg text-sm transition">
          생성
        </button>
      </div>
    </form>
  </div>

  <!-- 복사 완료 팝업 -->
  <div id="copyModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full space-y-4 text-center">
      <p class="text-gray-800 font-semibold">그룹 링크가 복사되었습니다.</p>
      <p class="text-gray-500 text-sm">필요한 곳에 공유하세요.</p>
      <button id="copyModalOkBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        확인
      </button>
    </div>
  </div>

  <main class="max-w-2xl mx-auto p-4 space-y-4">
    <div id="groupList">
      <p class="text-gray-400 text-sm text-center py-10">불러오는 중...</p>
    </div>
  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const ministryCode = new URLSearchParams(location.search).get('ministry') || '0'

    async function loadTitle() {
      const { data: ministry } = await sb.from('COMM_CODE').select('code_nm')
        .eq('code_group', 'ministry').eq('code_cd', ministryCode).maybeSingle()
      if (ministry?.code_nm) {
        document.getElementById('siteTitle').textContent = `✝ 2026년 ${ministry.code_nm} 성경통독`
      }
    }
    loadTitle()

    async function loadGroups() {
      const { data: groups } = await sb.from('groups').select('group_code, group_nm')
        .eq('ministry_cd', ministryCode)
      if (groups) groups.sort((a, b) =>
        a.group_code.localeCompare(b.group_code, 'ko', { numeric: true })
      )
      const listEl = document.getElementById('groupList')

      if (!groups || groups.length === 0) {
        listEl.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">등록된 그룹이 없습니다</p>'
        return
      }

      listEl.innerHTML = `
        <div class="flex flex-wrap gap-2">
          ${groups.map(g => `
            <button onclick="location.href='index.html?group=${encodeURIComponent(g.group_code)}&ministry=${encodeURIComponent(ministryCode)}'"
              class="bg-white hover:bg-blue-700 hover:text-white text-gray-800 font-semibold
                     px-4 py-2 rounded-xl shadow text-sm transition">
              ${g.group_nm}
            </button>
          `).join('')}
        </div>`
    }

    function isValidGroupCode(text) {
      if (!text || text.length === 0) return false
      // 한글, 영문, 숫자, 공백, 하이픈, 언더스코어, 마침표, 괄호만 허용
      return /^[\p{L}\p{N}\p{M}\s\-_.()]+$/u.test(text)
    }

    async function openCreateModal() {
      document.getElementById('newGroupName').value = ''
      document.getElementById('createError').classList.add('hidden')
      document.getElementById('createModal').classList.remove('hidden')
      document.getElementById('newGroupName').focus()
      await loadPlanOptions()
    }

    async function loadPlanOptions() {
      const { data } = await sb.from('COMM_CODE')
        .select('code_cd, code_nm')
        .eq('code_group', 'plan')
        .order('code_cd')
      const sel = document.getElementById('newPlanSetCd')
      sel.innerHTML = (data || []).map(r =>
        `<option value="${r.code_cd}">${r.code_cd} - ${r.code_nm || ''}`
      ).join('')
    }

    document.getElementById('createCancelBtn').onclick = () =>
      document.getElementById('createModal').classList.add('hidden')

    document.getElementById('createConfirmBtn').onclick = async () => {
      const groupName  = document.getElementById('newGroupName').value.trim()
      const planSetCd  = document.getElementById('newPlanSetCd').value
      const errEl      = document.getElementById('createError')

      errEl.classList.add('hidden')

      if (!groupName) {
        errEl.textContent = '그룹명을 입력해주세요.'
        errEl.classList.remove('hidden')
        return
      }

      if (!isValidGroupCode(groupName)) {
        errEl.textContent = '한글, 영문, 숫자, 공백, 기호(-_.())만 사용 가능합니다'
        errEl.classList.remove('hidden')
        return
      }

      if (!planSetCd) {
        errEl.textContent = '플랜을 선택해주세요.'
        errEl.classList.remove('hidden')
        return
      }

      // 신규 그룹 생성 (group_code는 자동 채번)
      const { error } = await sb.from('groups').insert({
        group_nm: groupName,
        plan_set_cd: planSetCd,
        ministry_cd: ministryCode
      })
      if (error) {
        errEl.textContent = '생성 중 오류가 발생했습니다.'
        errEl.classList.remove('hidden')
        return
      }

      // 생성된 그룹의 code 조회
      const { data: newGroup } = await sb.from('groups').select('group_code')
        .eq('group_nm', groupName).eq('ministry_cd', ministryCode).maybeSingle()
      if (!newGroup) {
        errEl.textContent = '그룹 생성 후 조회에 실패했습니다.'
        errEl.classList.remove('hidden')
        return
      }

      // 모달 닫기
      document.getElementById('createModal').classList.add('hidden')

      // 그룹 링크 복사 및 모달 표시 (index.html로 공유)
      const url = `${location.origin}${location.pathname.replace('home.html', 'index.html')}?group=${encodeURIComponent(newGroup.group_code)}&ministry=${encodeURIComponent(ministryCode)}`
      await navigator.clipboard.writeText(url)
      document.getElementById('copyModal').classList.remove('hidden')
      document.getElementById('copyModalOkBtn').onclick = () => { location.href = url }
    }

    document.getElementById('newGroupName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('createConfirmBtn').click()
    })

    loadGroups()
  </script>
  <footer class="fixed bottom-3 right-4 text-gray-400 text-xs">ver.3.9.2026.0424</footer>

</body>
</html>
