<!DOCTYPE html>
<html lang="ko" style="font-size: 120%">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>프로필 편집</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button id="backBtn" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <h1 class="text-base font-bold">프로필 편집</h1>
  </header>

  <!-- 기록 이전 확인 모달 -->
  <div id="migrateModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full space-y-4">
      <p class="font-semibold text-gray-800 text-sm">플랜이 다른 그룹으로 이동</p>
      <p class="text-gray-600 text-xs leading-relaxed">
        새 그룹은 다른 성경 플랜을 사용합니다.<br>
        기존 완료 기록을 새 플랜에 맞게 이전하시겠습니까?<br>
        <span class="text-gray-400">(이전 불가 항목은 제외됩니다)</span>
      </p>
      <div class="flex flex-col gap-2">
        <button id="modalMigrateBtn"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg text-sm transition">
          기록 이전 후 이동
        </button>
        <button id="modalFreshBtn"
          class="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-semibold py-2 rounded-lg text-sm transition">
          기록 삭제 후 이동
        </button>
        <button id="modalCancelBtn"
          class="w-full text-gray-400 hover:text-gray-600 text-sm py-1">
          취소
        </button>
      </div>
    </div>
  </div>

  <main class="max-w-2xl mx-auto p-4">
    <form accept-charset="UTF-8" onsubmit="return false;">
      <div class="bg-white rounded-2xl shadow p-5 space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">닉네임</label>
          <input id="inputNickname" type="text"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">그룹 코드</label>
          <select id="inputGroup"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="">불러오는 중...</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">성경 버전</label>
          <select id="inputBibleVer"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="KJV">개역한글 (KJV)</option>
            <option value="KLB">현대인의 성경 (KLB)</option>
          </select>
        </div>

        <p id="errorMsg" class="text-red-500 text-xs hidden"></p>

        <button id="saveBtn" type="button"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
          저장
        </button>

        <hr class="border-gray-200"/>

        <button id="deleteBtn" type="button"
          class="w-full bg-white hover:bg-red-50 text-red-500 border border-red-300 font-semibold py-2.5 rounded-lg text-sm transition">
          계정 삭제
        </button>
      </div>
    </form>
  </main>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const params    = new URLSearchParams(location.search)
    const nickname  = params.get('nickname')
    const groupCode = params.get('group')
    if (!nickname || !groupCode) location.href = 'index.html'

    document.getElementById('inputNickname').value = nickname
    document.getElementById('backBtn').onclick = () =>
      location.href = `record.html?nickname=${encodeURIComponent(nickname)}&group=${encodeURIComponent(groupCode)}`

    // 사용자 정보 로드 (성경 버전 포함)
    async function loadUser() {
      const { data: user } = await sb.from('users').select('bible_ver_cd')
        .eq('nickname', nickname).eq('group_code', groupCode).maybeSingle()
      if (user?.bible_ver_cd) {
        document.getElementById('inputBibleVer').value = user.bible_ver_cd
      } else {
        document.getElementById('inputBibleVer').value = 'KJV'
      }
    }
    loadUser()

    // 그룹 목록 로드
    async function loadGroups() {
      const { data: groups } = await sb.from('groups').select('group_code')
      if (!groups) return
      groups.sort((a, b) => a.group_code.localeCompare(b.group_code, 'ko', { numeric: true }))
      const sel = document.getElementById('inputGroup')
      sel.innerHTML = groups.map(g =>
        `<option value="${g.group_code}" ${g.group_code === groupCode ? 'selected' : ''}>${g.group_code}</option>`
      ).join('')
    }
    loadGroups()

    function isValidNickname(text) {
      if (!text || text.length === 0) return false
      // 한글, 영문, 숫자, 공백, 하이픈, 언더스코어, 마침표, 괄호만 허용
      return /^[\p{L}\p{N}\p{M}\s\-_.()]+$/u.test(text)
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.classList.remove('hidden')
    }
    function hideError() {
      document.getElementById('errorMsg').classList.add('hidden')
    }

    // ── 모달 ─────────────────────────────────────────────────────────────
    // resolve(true) = 이전, resolve(false) = 삭제 후 이동, resolve(null) = 취소
    function showMigrateModal() {
      return new Promise(resolve => {
        document.getElementById('migrateModal').classList.remove('hidden')
        document.getElementById('modalMigrateBtn').onclick = () => {
          document.getElementById('migrateModal').classList.add('hidden')
          resolve(true)
        }
        document.getElementById('modalFreshBtn').onclick = () => {
          document.getElementById('migrateModal').classList.add('hidden')
          resolve(false)
        }
        document.getElementById('modalCancelBtn').onclick = () => {
          document.getElementById('migrateModal').classList.add('hidden')
          resolve(null)
        }
      })
    }

    // ── 기록 이전 ─────────────────────────────────────────────────────────
    async function migrateRecords(userId, newPlanSetCd) {
      // 완료된 기록의 book, chapter_no 조회
      const { data: completed } = await sb.from('records')
        .select('plans(book, chapter_no)')
        .eq('user_id', userId)
        .eq('completed', true)
      if (!completed || completed.length === 0) return

      // 새 plan_set의 plan_id 맵 { "책:장" → id }
      const { data: newPlans } = await sb.from('plans')
        .select('id, book, chapter_no')
        .eq('plan_set_cd', newPlanSetCd)
      if (!newPlans) return

      const planMap = {}
      for (const p of newPlans) planMap[`${p.book}:${p.chapter_no}`] = p.id

      // 기존 records 삭제
      await sb.from('records').delete().eq('user_id', userId)

      // 매칭되는 새 plan_id로 records 삽입
      const now = new Date().toISOString()
      const newRecords = completed
        .map(r => {
          const { book, chapter_no } = r.plans
          const newPlanId = planMap[`${book}:${chapter_no}`]
          return newPlanId ? { user_id: userId, plan_id: newPlanId, completed: true, updated_at: now } : null
        })
        .filter(Boolean)

      if (newRecords.length > 0) {
        await sb.from('records').insert(newRecords)
      }
    }

    // ── 저장 ─────────────────────────────────────────────────────────────
    document.getElementById('saveBtn').onclick = async () => {
      hideError()
      const newNickname = document.getElementById('inputNickname').value.trim()
      const newGroup    = document.getElementById('inputGroup').value.trim()
      const newBibleVer = document.getElementById('inputBibleVer').value.trim()

      if (!newNickname) { showError('닉네임을 입력해주세요.'); return }
      if (!isValidNickname(newNickname)) { showError('한글, 영문, 숫자, 공백, 기호(-_.())만 사용 가능합니다'); return }
      if (!newGroup)    { showError('그룹 코드를 입력해주세요.'); return }

      // 현재 사용자 조회
      const { data: user } = await sb.from('users').select('id')
        .eq('nickname', nickname).eq('group_code', groupCode).maybeSingle()
      if (!user) { showError('사용자를 찾을 수 없습니다.'); return }

      // 닉네임+그룹 중복 확인 (자신 제외)
      if (newNickname !== nickname || newGroup !== groupCode) {
        const { data: dup } = await sb.from('users').select('id')
          .eq('nickname', newNickname).eq('group_code', newGroup).maybeSingle()
        if (dup && dup.id !== user.id) {
          showError('해당 그룹에 이미 같은 닉네임이 존재합니다.')
          return
        }
      }

      // 그룹 변경 시 plan_set_cd 비교
      if (newGroup !== groupCode) {
        const [{ data: oldGrp }, { data: newGrp }] = await Promise.all([
          sb.from('groups').select('plan_set_cd').eq('group_code', groupCode).maybeSingle(),
          sb.from('groups').select('plan_set_cd').eq('group_code', newGroup).maybeSingle(),
        ])
        const oldPlanSetCd = oldGrp?.plan_set_cd ?? '1'
        const newPlanSetCd = newGrp?.plan_set_cd ?? '1'

        if (oldPlanSetCd !== newPlanSetCd) {
          const choice = await showMigrateModal()
          if (choice === null) return  // 취소

          if (choice === true) {
            await migrateRecords(user.id, newPlanSetCd)
          } else {
            await sb.from('records').delete().eq('user_id', user.id)
          }
        }

      }

      const { error } = await sb.from('users')
        .update({ nickname: newNickname, group_code: newGroup, bible_ver_cd: newBibleVer })
        .eq('id', user.id)
      if (error) { showError('저장 중 오류가 발생했습니다.'); return }

      location.href = `record.html?nickname=${encodeURIComponent(newNickname)}&group=${encodeURIComponent(newGroup)}`
    }

    // ── 삭제 ─────────────────────────────────────────────────────────────
    document.getElementById('deleteBtn').onclick = async () => {
      if (!confirm(`'${nickname}' 계정과 모든 기록을 삭제합니다. 계속하시겠습니까?`)) return

      const { data: user } = await sb.from('users').select('id')
        .eq('nickname', nickname).eq('group_code', groupCode).maybeSingle()
      if (!user) { showError('사용자를 찾을 수 없습니다.'); return }

      await sb.from('records').delete().eq('user_id', user.id)
      await sb.from('users').delete().eq('id', user.id)

      location.href = `index.html?group=${encodeURIComponent(groupCode)}`
    }
  </script>
</body>
</html>
