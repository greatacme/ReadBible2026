<!DOCTYPE html>
<html lang="ko" style="font-size: 120%">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>성경 읽기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-white min-h-screen">

  <header class="bg-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg sticky top-0 z-10">
    <button onclick="goBack()" class="text-blue-300 hover:text-white text-xl leading-none">←</button>
    <div class="flex-1 min-w-0">
      <h1 id="chapterTitle" class="text-base font-bold truncate">성경 읽기</h1>
    </div>
    <div id="saveIndicator" class="text-xs text-green-300 opacity-0 transition-opacity duration-500 whitespace-nowrap">
      저장됨 ✓
    </div>
    <div id="planDate" class="text-xs text-blue-300 whitespace-nowrap"></div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-4 pb-28">
    <div id="content">
      <p class="text-gray-400 text-center py-10">불러오는 중...</p>
    </div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
    <div class="max-w-2xl mx-auto flex items-center gap-4 px-4 py-3">
      <button id="prevBtn" onclick="navigate(-1)"
        class="flex-1 py-2 rounded-lg bg-gray-100 text-gray-700 text-sm font-semibold hover:bg-gray-200 transition"
        disabled>
        ◀ 이전
      </button>
      <input type="checkbox" id="completeChk" onchange="toggleComplete(this.checked)"
        class="w-7 h-7 accent-blue-700 cursor-pointer flex-shrink-0"/>
      <button id="nextBtn" onclick="navigate(1)"
        class="flex-1 py-2 rounded-lg bg-blue-800 text-white text-sm font-semibold hover:bg-blue-900 transition"
        disabled>
        다음 ▶
      </button>
    </div>
  </footer>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://wwnohpprdjnvdjccednr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    )

    const BOOK_CODES = {
      '창세기':'GEN','출애굽기':'EXO','레위기':'LEV','민수기':'NUM','신명기':'DEU',
      '여호수아':'JOS','사사기':'JDG','룻기':'RUT','사무엘상':'1SA','사무엘하':'2SA',
      '열왕기상':'1KI','열왕기하':'2KI','역대상':'1CH','역대하':'2CH',
      '에스라':'EZR','느헤미야':'NEH','에스더':'EST','욥기':'JOB','시편':'PSA',
      '잠언':'PRO','전도서':'ECC','아가':'SNG','이사야':'ISA','예레미야':'JER',
      '예레미야애가':'LAM','에스겔':'EZK','다니엘':'DAN','호세아':'HOS','요엘':'JOL',
      '아모스':'AMO','오바댜':'OBA','요나':'JON','미가':'MIC','나훔':'NAH',
      '하박국':'HAB','스바냐':'ZEP','학개':'HAG','스가랴':'ZEC','말라기':'MAL',
      '마태복음':'MAT','마가복음':'MRK','누가복음':'LUK','요한복음':'JHN',
      '사도행전':'ACT','로마서':'ROM','고린도전서':'1CO','고린도후서':'2CO',
      '갈라디아서':'GAL','에베소서':'EPH','빌립보서':'PHP','골로새서':'COL',
      '데살로니가전서':'1TH','데살로니가후서':'2TH','디모데전서':'1TI','디모데후서':'2TI',
      '디도서':'TIT','빌레몬서':'PHM','히브리서':'HEB','야고보서':'JAS',
      '베드로전서':'1PE','베드로후서':'2PE','요한1서':'1JN','요한2서':'2JN',
      '요한3서':'3JN','유다서':'JUD','요한계시록':'REV'
    }

    const p          = new URLSearchParams(location.search)
    const nickname   = p.get('nickname')
    const planId     = Number(p.get('plan_id'))
    const book       = p.get('book')
    const chapterNo  = Number(p.get('chapter_no'))
    const sortOrder  = Number(p.get('sort_order'))

    const groupCode    = p.get('group')
    const ministryCode = p.get('ministry') || '0'
    const groupParam = groupCode ? `&group=${encodeURIComponent(groupCode)}&ministry=${encodeURIComponent(ministryCode)}` : ''

    if (!nickname || !book || !chapterNo || !groupCode) location.href = 'index.html'

    let userId           = null
    let planSetCd        = '1'
    let bibleVerCd       = 'KJV'
    let scrolledToBottom = false
    let saveTimer        = null
    let prevPlan         = null
    let nextPlan         = null

    const klbBibleId = 86  // KLB (Korean Living Bible) Bible ID
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3bm9ocHByZGpudmRqY2NlZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY1NzYsImV4cCI6MjA4OTM5MjU3Nn0.GYpMk0VTi4lSsrWtiqeW5AZ3BulCUv3lg13_VBJeyd4'
    let bibleStructure = {}  // 성경 구조 캐시 (책별 절 정보)

    // ── 저장 표시 ────────────────────────────────────────────────────────
    function showSaveIndicator() {
      const ind = document.getElementById('saveIndicator')
      ind.style.opacity = '1'
      clearTimeout(saveTimer)
      saveTimer = setTimeout(() => { ind.style.opacity = '0' }, 2000)
    }

    // ── 스크롤 감지 ──────────────────────────────────────────────────────
    function checkScroll() {
      if (scrolledToBottom) return
      if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 60) {
        scrolledToBottom = true
        const chk = document.getElementById('completeChk')
        if (chk && !chk.checked) {
          chk.checked = true
          toggleComplete(true)
        }
      }
    }
    window.addEventListener('scroll', checkScroll, { passive: true })

    // ── 뒤로 가기 ────────────────────────────────────────────────────────
    function goBack() {
      location.href = `record.html?nickname=${encodeURIComponent(nickname)}${groupParam}`
    }

    // ── 읽기 완료 토글 저장 ──────────────────────────────────────────────
    async function toggleComplete(checked) {
      if (!userId || !planId) return
      await sb.from('records').upsert(
        { user_id: userId, plan_id: planId, completed: checked, updated_at: new Date().toISOString() },
        { onConflict: 'user_id,plan_id' }
      )
      showSaveIndicator()
    }

    // ── 이전/다음 이동 ───────────────────────────────────────────────────
    function navigate(dir) {
      const target = dir > 0 ? nextPlan : prevPlan
      if (!target) return
      location.href = `bible.html?nickname=${encodeURIComponent(nickname)}&plan_id=${target.id}&book=${encodeURIComponent(target.book)}&chapter_no=${target.chapter_no}&sort_order=${target.sort_order}${groupParam}`
    }

    // ── 인접 계획 조회 ───────────────────────────────────────────────────
    async function loadAdjacentPlans() {
      const [prevRes, nextRes] = await Promise.all([
        sb.from('plans').select('id,book,chapter_no,sort_order').eq('plan_set_cd', planSetCd).eq('sort_order', sortOrder - 1).maybeSingle(),
        sb.from('plans').select('id,book,chapter_no,sort_order').eq('plan_set_cd', planSetCd).eq('sort_order', sortOrder + 1).maybeSingle()
      ])
      prevPlan = prevRes.data
      nextPlan = nextRes.data
      document.getElementById('prevBtn').disabled = !prevPlan
      document.getElementById('nextBtn').disabled = !nextPlan
    }

    // ── 성경 본문 로드 (분기) ────────────────────────────────────────────
    async function loadChapter() {
      document.getElementById('chapterTitle').textContent = `${book} ${chapterNo}장`
      document.title = `${book} ${chapterNo}장`

      const { data: plan } = await sb.from('plans').select('date').eq('id', planId).maybeSingle()
      if (plan?.date) {
        const DAYS = ['일','월','화','수','목','금','토']
        const d = new Date(plan.date + 'T00:00:00')
        document.getElementById('planDate').textContent =
          `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`
      }

      // bibleVerCd 분기:
      // - 'KLB': YouVersion API (현대인의 성경)
      // - 'KJV': helloao.org API (개역한글)
      // - 그 외 (RNKSV 등): Supabase verse 테이블
      if (bibleVerCd === 'KLB') {
        await loadChapterFromYouVersion()
      } else if (bibleVerCd === 'KJV') {
        await loadChapterFromAPI()
      } else {
        await loadChapterFromDB(bibleVerCd)
      }
      setTimeout(checkScroll, 200)
    }

    // ── helloao.org API로 본문 로드 (기존 방식) ──────────────────────────
    async function loadChapterFromAPI() {
      const code = BOOK_CODES[book]
      if (!code) {
        document.getElementById('content').innerHTML =
          '<p class="text-red-500 text-center py-10">알 수 없는 성경 책 이름입니다</p>'
        return
      }
      try {
        const res    = await fetch(`https://bible.helloao.org/api/kor_old/${code}/${chapterNo}.json`)
        const data   = await res.json()
        const verses = data.chapter.content.filter(c => c.type === 'verse')
        renderVerses(verses.map(v => ({ verse: v.number, text: v.content.join(' ') })))
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<p class="text-red-500 text-center py-10">성경을 불러오지 못했습니다</p>'
      }
    }

    // ── Supabase verse 테이블로 본문 로드 ───────────────────────────────
    async function loadChapterFromDB(versionId) {
      const { data: bookRow } = await sb.from('book').select('book_id').eq('name_ko', book).maybeSingle()
      if (!bookRow) {
        document.getElementById('content').innerHTML =
          '<p class="text-red-500 text-center py-10">성경 책 정보를 찾을 수 없습니다</p>'
        return
      }
      const { data: verses, error } = await sb.from('verse')
        .select('verse, text')
        .eq('version_id', versionId)
        .eq('book_id', bookRow.book_id)
        .eq('chapter', chapterNo)
        .order('verse')
      if (error || !verses?.length) {
        document.getElementById('content').innerHTML =
          '<p class="text-red-500 text-center py-10">성경을 불러오지 못했습니다</p>'
        return
      }
      renderVerses(verses.map(v => ({
        verse: v.verse,
        text: v.text.replace(/[a-z](?=[가-힣])/g, '').replace(/＼/g, '<br>')
      })))
    }

// ── YouVersion API로 본문 로드 (HTML 포맷, 절 단위 파싱) ────────────────
    async function loadChapterFromYouVersion() {
      try {
        const code = BOOK_CODES[book]
        if (!code) {
          document.getElementById('content').innerHTML =
            '<p class="text-red-500 text-center py-10">알 수 없는 성경 책 이름입니다</p>'
          return
        }

        const passageId = `${code}.${chapterNo}`

        let url, fetchOptions = {}
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          // 로컬: 프록시 서버
          url = `http://127.0.0.1:8001/youversion/bibles/${klbBibleId}/passages/${passageId}?format=html`
        } else {
          // 프로덕션: Supabase Edge Functions
          url = `https://wwnohpprdjnvdjccednr.supabase.co/functions/v1/youversion-proxy?bible_id=${klbBibleId}&passage_id=${passageId}&format=html`
          fetchOptions = {
            headers: {
              'Authorization': `Bearer ${supabaseAnonKey}`
            }
          }
        }
        const res = await fetch(url, fetchOptions)

        if (!res.ok) {
          throw new Error(`API 오류: ${res.status}`)
        }

        const data = await res.json()

        if (!data.content || typeof data.content !== 'string') {
          document.getElementById('content').innerHTML =
            '<p class="text-red-500 text-center py-10">성경을 불러오지 못했습니다</p>'
          return
        }

        // HTML을 파싱해서 절 단위로 분리
        // 구조: <div class="p"><span class="yv-v" v="1"></span><span class="yv-vlbl">1</span>텍스트</div>
        const parser = new DOMParser()
        const htmlDoc = parser.parseFromString(data.content, 'text/html')
        const verseElements = htmlDoc.querySelectorAll('div.p')

        const verses = []
        verseElements.forEach(el => {
          const verseLabel = el.querySelector('span.yv-vlbl')?.textContent || ''
          const verseNo = parseInt(verseLabel.split('-')[0]) // "1" 또는 "6-7" 형태 대비

          // 절 번호 span들 제거 후 텍스트만 추출
          el.querySelectorAll('span').forEach(s => s.remove())
          const text = el.textContent.trim()

          if (verseNo && text) {
            verses.push({
              verse: verseNo,
              text: text
            })
          }
        })

        if (verses.length === 0) {
          document.getElementById('content').innerHTML =
            '<p class="text-red-500 text-center py-10">성경을 불러오지 못했습니다</p>'
          return
        }

        renderVerses(verses)
      } catch (e) {
        console.error('YouVersion 본문 로드 오류:', e)
        document.getElementById('content').innerHTML =
          '<p class="text-red-500 text-center py-10">성경을 불러오지 못했습니다</p>'
      }
    }

    // ── 절 목록 렌더링 ───────────────────────────────────────────────────
    function renderVerses(verses) {
      document.getElementById('content').innerHTML = `
        <h2 class="text-lg font-bold text-gray-700 mb-4">${book} ${chapterNo}장</h2>
        ${verses.map(v => `
          <div class="flex gap-3 mb-3">
            <span class="text-blue-400 text-xs font-bold w-5 flex-shrink-0 pt-1">${v.verse}</span>
            <p class="text-gray-800 text-sm leading-7">${v.text}</p>
          </div>
        `).join('')}
      `
    }

// ── 초기화 ───────────────────────────────────────────────────────────
    async function init() {
      // groups + user 조회 병렬
      const [{ data: grp }, { data: user }] = await Promise.all([
        sb.from('groups').select('plan_set_cd').eq('group_code', groupCode).maybeSingle(),
        sb.from('users').select('id, bible_ver_cd').eq('nickname', nickname).eq('group_code', groupCode).maybeSingle()
      ])
      planSetCd = grp?.plan_set_cd ?? '1'

      if (user) {
        userId = user.id
        bibleVerCd = user.bible_ver_cd || 'KJV'
        const { data: rec } = await sb.from('records')
          .select('completed').eq('user_id', userId).eq('plan_id', planId).maybeSingle()
        if (rec?.completed) {
          scrolledToBottom = true
          document.getElementById('completeChk').checked = true
        }
      }
      await Promise.all([loadChapter(), loadAdjacentPlans()])
    }

    init()
  </script>
</body>
</html>
